<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>온보딩 가이드</title>

  <style>
    :root{
      --bg:#F6F7FB;
      --card:#FFFFFF;
      --text:#111827;
      --muted:#6B7280;
      --line:#E5E7EB;

      --poomgo:#0040D1;
      --poomgo-weak:rgba(0,64,209,.08);

      --ok:#16A34A;
      --ok-weak:#ECFDF5;
      --ok-border:#BBF7D0;

      --warn:#D97706;
      --warn-weak:#FFF7ED;
      --warn-border:#FED7AA;

      --danger:#DC2626;
      --danger-weak:#FEF2F2;
      --danger-border:#FECACA;

      --shadow:0 10px 28px rgba(17,24,39,.08);
      --shadow2:0 18px 40px rgba(17,24,39,.12);
      --radius:22px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Pretendard, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:28px 18px 56px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .title{
      margin:0;
      font-size:28px;
      font-weight:900;
      letter-spacing:-.03em;
    }

    .sub{
      margin:8px 0 0;
      color:var(--muted);
      font-size:14px;
      font-weight:700;
      line-height:1.55;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      height:34px;
      padding:0 12px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      color:#374151;
      font-size:13px;
      font-weight:800;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .progressCard{
      padding:18px;
      margin-bottom:14px;
    }

    .progressHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .progressTitle{
      margin:0;
      font-size:15px;
      font-weight:900;
    }

    .progressMeta{
      color:var(--muted);
      font-size:13px;
      font-weight:800;
    }

    .bar{
      width:100%;
      height:12px;
      border-radius:999px;
      background:#E5E7EB;
      overflow:hidden;
    }

    .barFill{
      width:0%;
      height:100%;
      background:linear-gradient(90deg, #0040D1, #2F6BFF);
      transition:width .25s ease;
    }

    .notice{
      padding:16px;
      margin-bottom:14px;
      border:1px solid var(--warn-border);
      background:var(--warn-weak);
    }

    .noticeTitle{
      margin:0 0 6px;
      color:#9A3412;
      font-size:15px;
      font-weight:900;
    }

    .noticeDesc{
      margin:0;
      color:#B45309;
      font-size:13px;
      font-weight:700;
      line-height:1.55;
    }

    .steps{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .step{
      padding:16px;
    }

    .stepHeader{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .leftHead{
      display:flex;
      align-items:flex-start;
      gap:10px;
      min-width:0;
      flex:1 1 auto;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:72px;
      height:30px;
      padding:0 12px;
      border-radius:999px;
      background:var(--poomgo-weak);
      color:var(--poomgo);
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
      line-height:1;
    }

    .badge.completed{
      background:var(--ok-weak);
      color:var(--ok);
    }

    .stepTitle{
      margin:0;
      font-size:18px;
      font-weight:900;
      letter-spacing:-.02em;
      line-height:1.35;
    }

    .stepCode{
      margin:4px 0 0;
      color:var(--muted);
      font-size:12px;
      font-weight:800;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:38px;
      padding:0 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      font-size:13px;
      font-weight:900;
      line-height:1;
      cursor:pointer;
      text-decoration:none;
      white-space:nowrap;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 18px rgba(17,24,39,.08);
    }

    .btn.primary{
      background:var(--poomgo);
      border-color:transparent;
      color:#fff;
    }

    .btn.done{
      background:var(--ok);
      border-color:transparent;
      color:#fff;
    }

    .stepBody{
      margin-top:14px;
      display:block;
    }

    .collapsed .stepBody{
      display:none;
    }

    .collapsed .stepHeader{
      margin-bottom:0;
    }

    .step.isLocked .stepBody{
      display:none;
    }

    .step.isLocked .actions .btn{
      opacity:.45;
      pointer-events:none;
    }

    .lockHint{
      display:none;
      margin-top:10px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#F9FAFB;
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      line-height:1.55;
    }

    .step.isLocked .lockHint{
      display:block;
    }

    .blocks{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .block{
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      background:#fff;
    }

    .blockHead{
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      background:#FAFAFB;
    }

    .blockTitle{
      margin:0;
      font-size:15px;
      font-weight:900;
      line-height:1.45;
    }

    .path{
      margin-top:8px;
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding:12px 14px;
      background:var(--poomgo-weak);
      border-left:5px solid var(--poomgo);
    }

    .pathBadge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:52px;
      height:30px;
      padding:0 10px;
      border-radius:10px;
      background:#fff;
      border:1px solid rgba(0,64,209,.18);
      color:var(--poomgo);
      font-size:12px;
      font-weight:900;
      flex:0 0 auto;
    }

    .pathText{
      color:#1F2937;
      font-size:14px;
      font-weight:800;
      line-height:1.55;
      word-break:break-word;
    }

    .desc{
      padding:14px;
      font-size:14px;
      font-weight:800;
      color:#1F2937;
      line-height:1.7;
      white-space:pre-line;
    }

    .highlight{
      margin:0 14px 14px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--danger-border);
      background:var(--danger-weak);
      color:#991B1B;
      font-size:13px;
      font-weight:900;
      line-height:1.55;
    }

    .imgWrap{
      padding:14px;
      background:#fff;
    }

    .imgWrap img{
      width:100%;
      display:block;
      border-radius:14px;
      border:1px solid var(--line);
      cursor:zoom-in;
    }

    .imgHint{
      margin:8px 0 0;
      text-align:right;
      color:var(--muted);
      font-size:12px;
      font-weight:700;
    }

    .buttonArea{
      padding:0 14px 14px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .checklist{
      padding:14px;
    }

    .checklist ul{
      margin:0;
      padding-left:20px;
    }

    .checklist li{
      margin-bottom:8px;
      color:#1F2937;
      font-size:14px;
      font-weight:800;
      line-height:1.6;
    }

    .finalMsg{
      display:none;
      margin-top:14px;
      padding:18px;
      border:1px solid var(--ok-border);
      background:var(--ok-weak);
    }

    .finalMsg p{
      margin:0;
      color:#166534;
      font-size:15px;
      font-weight:900;
      line-height:1.6;
    }

    .empty{
      padding:18px;
      color:var(--muted);
      font-size:14px;
      font-weight:800;
      text-align:center;
    }

    .modalBack{
      position:fixed;
      inset:0;
      background:rgba(17,24,39,.6);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:50;
    }

    .modal{
      width:min(1280px, 98vw);
      max-height:94vh;
      overflow:auto;
      background:#fff;
      border-radius:22px;
      box-shadow:var(--shadow2);
      border:1px solid rgba(255,255,255,.25);
    }

    .modalHead{
      position:sticky;
      top:0;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:14px 16px;
      background:#fff;
      border-bottom:1px solid var(--line);
      z-index:2;
    }

    .modalTitle{
      margin:0;
      font-size:14px;
      font-weight:900;
    }

    .modalBody{
      padding:16px;
    }

    .zoomImg{
      width:100%;
      display:block;
      border-radius:16px;
      border:1px solid var(--line);
    }

    @media (max-width: 640px){
      .title{ font-size:22px; }
      .stepTitle{ font-size:16px; }
      .path{ flex-direction:column; }
      .badge{ min-width:auto; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 class="title" id="pageTitle">온보딩 가이드</h1>
        <p class="sub" id="pageSubtitle">데이터를 불러오는 중입니다.</p>
      </div>
      <div class="chip" id="clientChip">고객사 확인 중</div>
    </div>

    <div class="card progressCard">
      <div class="progressHead">
        <p class="progressTitle">진행률</p>
        <div class="progressMeta" id="progressMeta">0 / 0 단계 완료</div>
      </div>
      <div class="bar">
        <div class="barFill" id="barFill"></div>
      </div>
    </div>

    <div class="card notice">
      <p class="noticeTitle">안내</p>
      <p class="noticeDesc">
        각 단계를 확인한 뒤 <b>완료</b> 버튼을 눌러 다음 단계로 이동해주세요.
        새로고침해도 진행 상태는 이 브라우저에 저장됩니다.
      </p>
    </div>

    <div class="steps" id="stepsContainer">
      <div class="card empty">가이드를 불러오는 중입니다.</div>
    </div>

    <div class="card finalMsg" id="finalMsg">
      <p>✅ 모든 온보딩 단계를 완료했습니다. 담당자에게 완료 여부를 공유해주세요.</p>
    </div>
  </div>

  <div class="modalBack" id="zoomBack">
    <div class="modal">
      <div class="modalHead">
        <p class="modalTitle" id="zoomTitle">이미지 확대</p>
        <button class="btn" id="zoomClose" type="button">닫기</button>
      </div>
      <div class="modalBody">
        <img class="zoomImg" id="zoomImg" src="" alt="zoom" />
      </div>
    </div>
  </div>

  <script>
    /*************************************************
     * 설정
     *************************************************/
    const APPS_SCRIPT_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzJHhyl4gwS6R7MXtWKuFbTMZE0-DOwyGPA73l19dJD_SCF7S2mtyazd_1OmVvAoCJV/exec';

    /*************************************************
     * 전역 상태
     *************************************************/
    let payload = null;
    let groupedSteps = [];
    let completedSteps = [];

    const params = new URLSearchParams(location.search);
    const clientCode = params.get('client') || '';

    function progressKey() {
      return 'onboarding_progress_' + clientCode;
    }

    function loadProgress() {
      try {
        const raw = localStorage.getItem(progressKey());
        const parsed = raw ? JSON.parse(raw) : [];
        completedSteps = Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        completedSteps = [];
      }
    }

    function saveProgress() {
      localStorage.setItem(progressKey(), JSON.stringify(completedSteps));
    }

    function isCompleted(stepNo) {
      return completedSteps.includes(stepNo);
    }

    function isLocked(stepNo) {
      return stepNo > 1 && !isCompleted(stepNo - 1);
    }

    /*************************************************
     * JSONP 로딩
     *************************************************/
    function loadData() {
      if (!clientCode) {
        showEmpty('고객사 코드가 없습니다. URL 뒤에 ?client=고객사코드 형태로 접속해주세요.');
        return;
      }

      if (!APPS_SCRIPT_WEBAPP_URL || APPS_SCRIPT_WEBAPP_URL.indexOf('여기에_앱스크립트_웹앱_URL_넣기') > -1) {
        showEmpty('Apps Script 웹앱 URL이 설정되지 않았습니다.');
        return;
      }

      window.renderOnboardingData = function(data) {
        payload = data;
        loadProgress();
        buildSteps();
        renderPage();
      };

      const src =
        APPS_SCRIPT_WEBAPP_URL +
        '?mode=data&client=' + encodeURIComponent(clientCode) +
        '&callback=renderOnboardingData';

      const script = document.createElement('script');
      script.src = src;
      script.onerror = function() {
        showEmpty('가이드 데이터를 불러오지 못했습니다. Apps Script 배포 상태와 URL을 확인해주세요.');
      };
      document.body.appendChild(script);
    }

    /*************************************************
     * 데이터 가공
     *************************************************/
    function buildSteps() {
      const items = (payload && payload.guideItems) ? payload.guideItems : [];
      const map = new Map();

      items.forEach(item => {
        if (!map.has(item.stepNo)) {
          map.set(item.stepNo, {
            stepNo: item.stepNo,
            stepCode: item.stepCode,
            stepName: item.stepName,
            blocks: []
          });
        }
        map.get(item.stepNo).blocks.push(item);
      });

      groupedSteps = Array.from(map.values()).sort((a, b) => a.stepNo - b.stepNo);
    }

    /*************************************************
     * 렌더링
     *************************************************/
    function renderPage() {
      const client = payload && payload.client ? payload.client : null;

      document.title = client && client.pageTitle ? client.pageTitle : '온보딩 가이드';
      document.getElementById('pageTitle').textContent = client && client.pageTitle ? client.pageTitle : '온보딩 가이드';
      document.getElementById('pageSubtitle').textContent = client && client.subtitle ? client.subtitle : '아래 순서대로 진행해주세요.';
      document.getElementById('clientChip').textContent = client && client.clientName ? client.clientName : '고객사';

      renderSteps();
      renderProgress();
      renderFinalMessage();
    }

    function renderSteps() {
      const container = document.getElementById('stepsContainer');

      if (!groupedSteps.length) {
        showEmpty('표시할 가이드 단계가 없습니다.');
        return;
      }

      container.innerHTML = groupedSteps.map(step => {
        const blocksHtml = step.blocks
          .sort((a, b) => a.blockOrder - b.blockOrder)
          .map(renderBlockHtml)
          .join('');

        return `
          <section class="card step ${isLocked(step.stepNo) ? 'isLocked' : ''}" id="step${step.stepNo}" data-step="${step.stepNo}">
            <div class="stepHeader">
              <div class="leftHead">
                <span class="badge ${isCompleted(step.stepNo) ? 'completed' : ''}" id="badge${step.stepNo}">
                  ${isCompleted(step.stepNo) ? '✔ STEP ' + step.stepNo : 'STEP ' + step.stepNo}
                </span>
                <div>
                  <p class="stepTitle">${escapeHtml(step.stepName)}</p>
                  <p class="stepCode">${escapeHtml(step.stepCode)}</p>
                </div>
              </div>

              <div class="actions">
                <button class="btn" id="toggle${step.stepNo}" type="button" style="${isCompleted(step.stepNo) ? '' : 'display:none;'}">
                  보기
                </button>
                <button class="btn done" id="done${step.stepNo}" type="button" style="${isCompleted(step.stepNo) ? 'display:none;' : ''}">
                  완료
                </button>
              </div>
            </div>

            <div class="lockHint">이전 단계를 완료하면 확인할 수 있습니다.</div>

            <div class="stepBody">
              <div class="blocks">
                ${blocksHtml}
              </div>
            </div>
          </section>
        `;
      }).join('');
    }

    function renderBlockHtml(block) {
      const type = block.blockType || '';
      const title = block.blockTitle || '';
      const path = block.path || '';
      const desc = block.desc || '';
      const imageThumb = block.imageThumb || '';
      const imageZoom = block.imageZoom || '';
      const buttonText = block.buttonText || '';
      const buttonUrl = block.buttonUrl || '';
      const highlight = block.highlight || '';

      const headHtml = title ? `
        <div class="blockHead">
          <p class="blockTitle">${escapeHtml(title)}</p>
        </div>
      ` : '';

      const pathHtml = path ? `
        <div class="path">
          <span class="pathBadge">경로</span>
          <div class="pathText">${escapeHtml(path)}</div>
        </div>
      ` : '';

      const descHtml = desc ? `
        <div class="desc">${escapeHtml(desc)}</div>
      ` : '';

      const highlightHtml = highlight ? `
        <div class="highlight">${escapeHtml(highlight)}</div>
      ` : '';

      const imageHtml = imageThumb ? `
        <div class="imgWrap">
          <img
            src="${escapeAttr(imageThumb)}"
            data-zoom="${escapeAttr(imageZoom || imageThumb)}"
            data-title="${escapeAttr(title || '이미지')}"
            alt="${escapeAttr(title || '이미지')}"
          />
          <p class="imgHint">이미지를 클릭하면 확대됩니다.</p>
        </div>
      ` : '';

      const buttonHtml = buttonText ? `
        <div class="buttonArea">
          ${buttonUrl
            ? `<a class="btn primary" href="${escapeAttr(buttonUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(buttonText)}</a>`
            : `<button class="btn primary" type="button" disabled>${escapeHtml(buttonText)}</button>`
          }
        </div>
      ` : '';

      const checklistHtml = type === '체크리스트' && desc ? `
        <div class="checklist">
          <ul>
            ${desc.split('/').map(item => `<li>${escapeHtml(item.trim())}</li>`).join('')}
          </ul>
        </div>
      ` : '';

      const normalDescHtml = type === '체크리스트' ? '' : descHtml;

      return `
        <div class="block">
          ${headHtml}
          ${pathHtml}
          ${type === '체크리스트' ? checklistHtml : normalDescHtml}
          ${highlightHtml}
          ${imageHtml}
          ${buttonHtml}
        </div>
      `;
    }

    function renderProgress() {
      const total = groupedSteps.length;
      const done = completedSteps.filter(stepNo => groupedSteps.some(s => s.stepNo === stepNo)).length;
      const pct = total ? Math.round((done / total) * 100) : 0;

      document.getElementById('progressMeta').textContent = done + ' / ' + total + ' 단계 완료';
      document.getElementById('barFill').style.width = pct + '%';
    }

    function renderFinalMessage() {
      const total = groupedSteps.length;
      const done = completedSteps.filter(stepNo => groupedSteps.some(s => s.stepNo === stepNo)).length;
      document.getElementById('finalMsg').style.display = (total > 0 && done === total) ? 'block' : 'none';
    }

    function showEmpty(message) {
      document.getElementById('stepsContainer').innerHTML = `<div class="card empty">${escapeHtml(message)}</div>`;
    }

    /*************************************************
     * 이벤트
     *************************************************/
    document.addEventListener('click', function(e) {
      const img = e.target.closest('img[data-zoom]');
      if (img) {
        const stepEl = img.closest('.step');
        if (stepEl && stepEl.classList.contains('isLocked')) return;
        openZoom(img.getAttribute('data-zoom'), img.getAttribute('data-title'));
        return;
      }

      const doneBtn = e.target.closest('button[id^="done"]');
      if (doneBtn) {
        const stepNo = Number(doneBtn.id.replace('done', ''));
        if (!stepNo || isLocked(stepNo) || isCompleted(stepNo)) return;
        completeStep(stepNo);
        return;
      }

      const toggleBtn = e.target.closest('button[id^="toggle"]');
      if (toggleBtn) {
        const stepNo = Number(toggleBtn.id.replace('toggle', ''));
        toggleStep(stepNo);
      }
    });

    function completeStep(stepNo) {
      if (!completedSteps.includes(stepNo)) {
        completedSteps.push(stepNo);
        completedSteps.sort((a, b) => a - b);
        saveProgress();
      }

      const stepEl = document.getElementById('step' + stepNo);
      if (stepEl) {
        stepEl.classList.add('collapsed');
      }

      rerenderAfterStateChange();

      const next = document.getElementById('step' + (stepNo + 1));
      if (next) {
        next.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function toggleStep(stepNo) {
      const stepEl = document.getElementById('step' + stepNo);
      const toggleBtn = document.getElementById('toggle' + stepNo);
      if (!stepEl || !toggleBtn) return;

      const collapsed = stepEl.classList.contains('collapsed');
      stepEl.classList.toggle('collapsed', !collapsed);
      toggleBtn.textContent = collapsed ? '접기' : '보기';
    }

    function rerenderAfterStateChange() {
      renderSteps();
      renderProgress();
      renderFinalMessage();
    }

    /*************************************************
     * 이미지 확대
     *************************************************/
    const zoomBack = document.getElementById('zoomBack');
    const zoomImg = document.getElementById('zoomImg');
    const zoomTitle = document.getElementById('zoomTitle');
    const zoomClose = document.getElementById('zoomClose');

    function openZoom(src, title) {
      if (!src) return;
      zoomImg.src = src;
      zoomTitle.textContent = title || '이미지 확대';
      zoomBack.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeZoom() {
      zoomBack.style.display = 'none';
      zoomImg.src = '';
      document.body.style.overflow = '';
    }

    zoomClose.addEventListener('click', closeZoom);
    zoomBack.addEventListener('click', function(e) {
      if (e.target === zoomBack) closeZoom();
    });

    window.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeZoom();
      }
    });

    /*************************************************
     * 유틸
     *************************************************/
    function escapeHtml(str) {
      return String(str == null ? '' : str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeAttr(str) {
      return escapeHtml(str);
    }

    /*************************************************
     * 시작
     *************************************************/
    loadData();
  </script>
</body>
</html>
