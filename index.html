<script>
  async function submitInquiry() {
    if (!pendingInquiryData) return;

    const finalSubmitBtn = document.getElementById('finalSubmitBtn');

    if (finalSubmitBtn) {
      finalSubmitBtn.disabled = true;
      finalSubmitBtn.textContent = '제출중...';
      finalSubmitBtn.style.opacity = '0.7';
      finalSubmitBtn.style.cursor = 'not-allowed';
    }

    alert('제출중입니다.');

    try {
      const params = new URLSearchParams();
      params.append('mode', 'submit_inquiry');
      params.append('clientCode', pendingInquiryData.clientCode || '');
      params.append('smartStoreUrl', pendingInquiryData.smartStoreUrl || '');
      params.append('firstInboundDate', pendingInquiryData.firstInboundDate || '');
      params.append('skuCount', pendingInquiryData.skuCount || '');
      params.append('pltCount', pendingInquiryData.pltCount || '');
      params.append('returnInfo', pendingInquiryData.returnInfo || '');
      params.append('packingType', pendingInquiryData.packingType || '');
      params.append('systemEmail', pendingInquiryData.systemEmail || '');
      params.append('userAgent', pendingInquiryData.userAgent || '');

      const res = await fetch(APPS_SCRIPT_WEBAPP_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
        },
        body: params.toString()
      });

      const text = await res.text();
      let result = {};

      try {
        result = JSON.parse(text);
      } catch (e) {
        throw new Error('응답 파싱 실패');
      }

      if (!result.ok) {
        throw new Error(result.message || '제출 중 오류가 발생했습니다.');
      }

      setInquiryDone();
      closeConfirmModal();

      document.getElementById('introCard').classList.add('hidden');
      document.getElementById('inquiryFormCard').classList.add('hidden');
      document.getElementById('guideSection').classList.remove('hidden');

      renderSidebar();
      renderCurrentStage();
      renderProgress();
      renderFinalMessage();

      alert('제출 완료!');

      document.getElementById('guideSection').scrollIntoView({
        behavior: 'smooth',
        block: 'start'
      });

    } catch (err) {
      console.error(err);
      alert(err.message || '제출 요청 중 오류가 발생했습니다. 웹앱 배포 상태를 확인해주세요.');
    } finally {
      if (finalSubmitBtn) {
        finalSubmitBtn.disabled = false;
        finalSubmitBtn.textContent = '제출하기';
        finalSubmitBtn.style.opacity = '';
        finalSubmitBtn.style.cursor = '';
      }
    }
  }
</script>
